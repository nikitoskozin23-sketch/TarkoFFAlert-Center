<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Custom Alerts Overlay</title>

  <style>
    :root {
      --bg: rgba(9, 11, 18, 0.94);
      --border: rgba(255, 255, 255, 0.12);
      --border-2: rgba(255, 255, 255, 0.08);
      --text: #f5f7ff;
      --muted: #aab3c8;
      --shadow:
        0 24px 70px rgba(0, 0, 0, 0.52),
        0 8px 24px rgba(0, 0, 0, 0.28);
      --radius: 28px;

      --accent-default: #7c5cff;
      --accent-da: #ff8a00;
      --accent-da-2: #ffb347;
      --accent-youtube: #ff3b30;
      --accent-vk: #3b82f6;
      --accent-twitch: #a970ff;
      --accent-trovo: #19e68c;
      --accent-fake: #9ca3af;

      --site-ad-accent: #ff8a00;
      --site-ad-accent-2: #ffd066;
      --site-ad-bg: rgba(10, 14, 24, 0.90);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Inter, Arial, sans-serif;
    }

    body {
      color: var(--text);
    }

    #stage {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    #site-ad-root {
      position: absolute;
      right: 34px;
      top: 34px;
      width: min(420px, calc(100vw - 48px));
      display: flex;
      justify-content: flex-end;
      opacity: 0;
      transform: translateY(-14px) scale(0.98);
      transition:
        opacity 0.35s ease,
        transform 0.35s ease;
      z-index: 5;
    }

    #site-ad-root.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .site-ad-card {
      position: relative;
      width: 100%;
      border-radius: 24px;
      padding: 18px 20px 18px 20px;
      background:
        radial-gradient(circle at top right, rgba(255,255,255,0.10), transparent 34%),
        linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)),
        var(--site-ad-bg);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow:
        0 18px 40px rgba(0,0,0,0.35),
        0 0 28px rgba(255,138,0,0.18);
      overflow: hidden;
      backdrop-filter: blur(14px);
    }

    .site-ad-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: linear-gradient(180deg, var(--site-ad-accent), var(--site-ad-accent-2));
      box-shadow: 0 0 18px var(--site-ad-accent);
    }

    .site-ad-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          110deg,
          transparent 0%,
          transparent 42%,
          rgba(255,255,255,0.07) 50%,
          transparent 58%,
          transparent 100%
        );
      transform: translateX(-135%);
      animation: siteAdShine 5.5s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes siteAdShine {
      0%, 76%, 100% {
        transform: translateX(-135%);
      }
      87% {
        transform: translateX(135%);
      }
    }

    .site-ad-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .site-ad-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: #fff;
    }

    .site-ad-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--site-ad-accent);
      box-shadow:
        0 0 10px var(--site-ad-accent),
        0 0 22px rgba(255,138,0,0.55);
      animation: siteAdPulse 1.5s infinite ease-in-out;
    }

    @keyframes siteAdPulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.95;
      }
      50% {
        transform: scale(1.18);
        opacity: 1;
      }
    }

    .site-ad-title {
      font-size: 28px;
      line-height: 1.08;
      font-weight: 900;
      color: #ffffff;
      margin: 0 0 8px 0;
      text-shadow: 0 2px 16px rgba(0,0,0,0.28);
      word-break: break-word;
    }

    .site-ad-line {
      font-size: 20px;
      line-height: 1.2;
      font-weight: 700;
      color: #eef3ff;
      margin: 0;
      word-break: break-word;
    }

    .site-ad-line + .site-ad-line {
      margin-top: 6px;
    }

    .site-ad-line.muted {
      color: var(--muted);
      font-weight: 600;
    }

    #alert-root {
      position: absolute;
      left: 50%;
      bottom: 56px;
      transform: translateX(-50%);
      width: min(1280px, calc(100vw - 48px));
      display: flex;
      justify-content: center;
      align-items: end;
      z-index: 10;
    }

    .alert-card {
      position: relative;
      width: 100%;
      min-height: 190px;
      max-height: 360px;
      border-radius: var(--radius);
      background:
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.06), transparent 30%),
        radial-gradient(circle at bottom left, rgba(255, 255, 255, 0.03), transparent 34%),
        linear-gradient(135deg, rgba(255,255,255,0.045), rgba(255,255,255,0.012)),
        var(--bg);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
      grid-template-columns: 128px minmax(0, 1fr) auto;
      opacity: 0;
      transform: translateY(32px) scale(0.965);
      backdrop-filter: blur(16px);
    }

    .alert-card.show {
      animation: alertIn 0.56s cubic-bezier(.2,.8,.2,1) forwards;
    }

    .alert-card.hide {
      animation: alertOut 0.42s ease forwards;
    }

    @keyframes alertIn {
      from {
        opacity: 0;
        transform: translateY(32px) scale(0.965);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes alertOut {
      from {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      to {
        opacity: 0;
        transform: translateY(18px) scale(0.985);
      }
    }

    .alert-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 5px;
      background: var(--accent, var(--accent-default));
      box-shadow: 0 0 20px var(--accent, var(--accent-default));
    }

    .alert-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          110deg,
          transparent 0%,
          transparent 40%,
          rgba(255,255,255,0.06) 50%,
          transparent 60%,
          transparent 100%
        );
      transform: translateX(-135%);
      animation: shine 4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes shine {
      0%, 72%, 100% {
        transform: translateX(-135%);
      }
      84% {
        transform: translateX(135%);
      }
    }

    .accent-da { --accent: var(--accent-da); }
    .accent-youtube { --accent: var(--accent-youtube); }
    .accent-vk_play { --accent: var(--accent-vk); }
    .accent-vk { --accent: var(--accent-vk); }
    .accent-twitch { --accent: var(--accent-twitch); }
    .accent-trovo { --accent: var(--accent-trovo); }
    .accent-fake { --accent: var(--accent-fake); }
    .accent-default { --accent: var(--accent-default); }

    .alert-media {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.08), transparent 68%),
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015)),
        rgba(255,255,255,0.02);
      border-right: 1px solid var(--border-2);
      overflow: hidden;
    }

    .alert-media::before {
      content: "";
      position: absolute;
      width: 98px;
      height: 98px;
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow:
        inset 0 0 20px rgba(255,255,255,0.04),
        0 0 28px rgba(0,0,0,0.22);
    }

    .alert-avatar,
    .provider-badge {
      position: relative;
      z-index: 1;
      width: 78px;
      height: 78px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)),
        rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow:
        inset 0 0 18px rgba(255,255,255,0.04),
        0 10px 24px rgba(0,0,0,0.28);
    }

    .alert-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .provider-badge {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 0.04em;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.35);
    }

    .alert-main {
      position: relative;
      z-index: 1;
      padding: 18px 22px 18px 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
      min-height: 0;
    }

    .alert-top {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      flex-shrink: 0;
    }

    .alert-provider {
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #fff;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow:
        inset 0 0 10px rgba(255,255,255,0.03),
        0 0 18px rgba(0,0,0,0.16);
    }

    .alert-provider strong {
      color: var(--accent, var(--accent-default));
      font-weight: 900;
    }

    .alert-main-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    .alert-sender-block {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
      flex-shrink: 0;
    }

    .alert-section-label {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .alert-sender {
      font-size: 54px;
      line-height: 1;
      font-weight: 900;
      margin: 0;
      color: #ffffff;
      text-shadow: 0 2px 18px rgba(0,0,0,0.35);
      word-break: break-word;
    }

    .alert-sender.size-sm { font-size: 46px; }
    .alert-sender.size-xs { font-size: 40px; }
    .alert-sender.no-message { font-size: 62px; }

    .alert-message-block {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
      min-height: 0;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 0 12px rgba(255,255,255,0.02);
      overflow: hidden;
    }

    .alert-message-block.fade::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 46px;
      background: linear-gradient(to bottom, rgba(9,11,18,0), rgba(9,11,18,0.92));
      pointer-events: none;
    }

    .alert-message {
      font-size: 28px;
      line-height: 1.28;
      color: #f2f5ff;
      margin: 0;
      word-break: break-word;
      text-shadow: 0 1px 10px rgba(0,0,0,0.24);
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 4;
      line-clamp: 4;
      overflow: hidden;
      text-overflow: ellipsis;
      max-height: calc(1.28em * 4);
    }

    .alert-amount-zone {
      position: relative;
      z-index: 1;
      min-width: 290px;
      padding: 18px 24px 18px 8px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .alert-amount-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .alert-amount-wrap.da::before {
      content: "";
      position: absolute;
      inset: -26px -36px;
      background: radial-gradient(circle, rgba(255,138,0,0.36), transparent 62%);
      filter: blur(18px);
      opacity: 1;
      pointer-events: none;
    }

    .alert-amount-wrap.da::after {
      content: "";
      position: absolute;
      inset: -10px -18px;
      background: radial-gradient(circle at center, rgba(255,196,96,0.28), transparent 58%);
      filter: blur(10px);
      opacity: 1;
      pointer-events: none;
    }

    .alert-amount-big {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 230px;
      min-height: 108px;
      padding: 16px 34px;
      font-size: 70px;
      line-height: 1;
      font-weight: 1000;
      font-variant-numeric: tabular-nums;
      color: #ffffff;
      text-align: center;
      white-space: nowrap;
      border-radius: 34px;
      text-shadow:
        0 2px 10px rgba(0,0,0,0.28),
        0 0 18px rgba(255,255,255,0.08);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.14), rgba(255,255,255,0.05)),
        rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow:
        inset 0 0 12px rgba(255,255,255,0.04),
        0 0 24px rgba(0,0,0,0.18);
    }

    .alert-amount-big.size-sm { font-size: 60px; min-width: 210px; }
    .alert-amount-big.size-xs { font-size: 50px; min-width: 190px; }

    .alert-amount-wrap.da .alert-amount-big {
      background:
        linear-gradient(135deg, #ff9d1f 0%, #ff8a00 45%, #ffb84d 100%);
      border: 2px solid rgba(255, 214, 140, 0.92);
      color: #fffdfa;
      box-shadow:
        0 0 20px rgba(255,138,0,0.45),
        0 0 44px rgba(255,138,0,0.34),
        inset 0 0 18px rgba(255,255,255,0.10);
    }

    .alert-amount-wrap.da .alert-amount-big::before {
      content: "";
      position: absolute;
      inset: 6px;
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.20);
      pointer-events: none;
    }

    .progress {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 5px;
      background: rgba(255,255,255,0.04);
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 100%;
      transform-origin: left center;
      background: linear-gradient(90deg, rgba(255,255,255,0.95), var(--accent, var(--accent-default)));
      box-shadow: 0 0 18px rgba(255,255,255,0.18);
      animation-name: progressShrink;
      animation-timing-function: linear;
      animation-fill-mode: forwards;
    }

    @keyframes progressShrink {
      from { transform: scaleX(1); }
      to { transform: scaleX(0); }
    }

    @media (max-width: 1200px) {
      .alert-sender {
        font-size: 44px;
      }

      .alert-sender.size-sm { font-size: 40px; }
      .alert-sender.size-xs { font-size: 36px; }
      .alert-sender.no-message { font-size: 52px; }

      .alert-message {
        font-size: 24px;
      }

      .alert-amount-zone {
        min-width: 240px;
      }

      .alert-amount-big {
        min-width: 190px;
        min-height: 92px;
        font-size: 58px;
        padding: 14px 26px;
      }

      .alert-amount-big.size-sm { font-size: 52px; }
      .alert-amount-big.size-xs { font-size: 44px; }

      #site-ad-root {
        width: min(360px, calc(100vw - 36px));
      }

      .site-ad-title {
        font-size: 24px;
      }

      .site-ad-line {
        font-size: 18px;
      }
    }

    @media (max-width: 960px) {
      .alert-card {
        grid-template-columns: 110px minmax(0, 1fr);
      }

      .alert-amount-zone {
        grid-column: 1 / -1;
        justify-content: flex-end;
        padding: 0 18px 18px 18px;
      }

      .alert-main {
        padding-bottom: 8px;
      }

      .alert-message {
        -webkit-line-clamp: 3;
        line-clamp: 3;
        max-height: calc(1.28em * 3);
      }

      #site-ad-root {
        top: 18px;
        right: 18px;
      }
    }
  </style>
</head>
<body>
  <div id="stage">
    <div id="site-ad-root">
      <div class="site-ad-card">
        <div class="site-ad-top">
          <div class="site-ad-chip">
            <span class="site-ad-dot"></span>
            СКОРО
          </div>
        </div>
        <h3 class="site-ad-title" id="site-ad-title">Скоро запуск сайта!</h3>
        <p class="site-ad-line" id="site-ad-line2">TarkoFFchanin.pro</p>
        <p class="site-ad-line muted" id="site-ad-line3">Следи за анонсами</p>
      </div>
    </div>

    <div id="alert-root"></div>
  </div>

  <script>
    const alertRoot = document.getElementById("alert-root");
    const siteAdRoot = document.getElementById("site-ad-root");
    const siteAdTitle = document.getElementById("site-ad-title");
    const siteAdLine2 = document.getElementById("site-ad-line2");
    const siteAdLine3 = document.getElementById("site-ad-line3");

    const queue = [];
    const SOUND_ROOT = "/static/sounds";
    const soundCache = new Map();

    let isShowing = false;
    let socket = null;
    let reconnectTimer = null;

    let settingsState = {
      show_site_ads: false,
      ad_title: "Скоро запуск сайта!",
      ad_line2: "TarkoFFchanin.pro",
      ad_line3: "Следи за анонсами",
      music_volume: "0.35",
      tts_volume: "1.00",
      tts_voice: "default",
    };

    function wsUrl() {
      if (location.protocol.startsWith("http")) {
        const proto = location.protocol === "https:" ? "wss:" : "ws:";
        return `${proto}//${location.host}/ws/overlay`;
      }
      return "ws://127.0.0.1:8765/ws/overlay";
    }

    function providerLabel(provider) {
      const p = String(provider || "").toLowerCase();
      if (p === "youtube") return "YouTube";
      if (p === "donation_alerts" || p === "donationalerts") return "DonationAlerts";
      if (p === "vk_play" || p === "vk") return "VK Play";
      if (p === "twitch") return "Twitch";
      if (p === "trovo") return "Trovo";
      if (p === "fake") return "Test";
      return "Alert";
    }

    function providerClass(provider) {
      const p = String(provider || "").toLowerCase();
      if (p === "youtube") return "accent-youtube";
      if (p === "donation_alerts" || p === "donationalerts") return "accent-da";
      if (p === "vk_play") return "accent-vk_play";
      if (p === "vk") return "accent-vk";
      if (p === "twitch") return "accent-twitch";
      if (p === "trovo") return "accent-trovo";
      if (p === "fake") return "accent-fake";
      return "accent-default";
    }

    function providerIcon(provider) {
      const p = String(provider || "").toLowerCase();
      if (p === "youtube") return "YT";
      if (p === "donation_alerts" || p === "donationalerts") return "DA";
      if (p === "vk_play" || p === "vk") return "VK";
      if (p === "twitch") return "TW";
      if (p === "trovo") return "TR";
      return "AL";
    }

    function buildSoundUrl(file) {
      if (!file) return "";
      if (/^https?:\/\//i.test(file) || file.startsWith("/")) {
        return file;
      }
      return `${SOUND_ROOT}/${file}`;
    }

    function soundFileForAlert(alert) {
      const type = String(alert.type || "").toLowerCase();
      const provider = String(alert.provider || "").toLowerCase();

      if (type === "donation") return "donation.mp3";
      if (type === "superchat") return "superchat.mp3";
      if (type === "subscribe" || type === "resubscribe" || type === "gift_sub" || type === "member") {
        return "subscribe.mp3";
      }
      if (type === "follow") return "follow.mp3";

      if (provider === "vk_play" && type === "custom") return "alert.mp3";
      if (provider === "youtube" && type === "custom") return "alert.mp3";
      if (provider === "donation_alerts") return "donation.mp3";

      return "alert.mp3";
    }

    function preloadSounds() {
      const files = [
        "alert.mp3",
        "follow.mp3",
        "subscribe.mp3",
        "donation.mp3",
        "superchat.mp3",
      ];

      for (const file of files) {
        const url = buildSoundUrl(file);
        const audio = new Audio(url);
        audio.preload = "auto";
        soundCache.set(file, audio);
      }
    }

    function clampVolume(rawValue, fallbackValue) {
      const parsed = Number(String(rawValue ?? "").replace(",", "."));
      if (!Number.isFinite(parsed)) return fallbackValue;
      if (parsed < 0) return 0;
      if (parsed > 1) return 1;
      return parsed;
    }

    function normalizeSettings(raw) {
      const src = raw && typeof raw === "object" ? raw : {};
      return {
        show_site_ads: Boolean(src.show_site_ads),
        ad_title: String(src.ad_title || "Скоро запуск сайта!"),
        ad_line2: String(src.ad_line2 || "TarkoFFchanin.pro"),
        ad_line3: String(src.ad_line3 || "Следи за анонсами"),
        music_volume: String(src.music_volume ?? "0.35"),
        tts_volume: String(src.tts_volume ?? "1.00"),
        tts_voice: String(src.tts_voice ?? "default"),
      };
    }

    function applySettings(raw) {
      settingsState = normalizeSettings(raw);
      renderSiteAd();
    }

    function renderSiteAd() {
      siteAdTitle.textContent = settingsState.ad_title || "Скоро запуск сайта!";
      siteAdLine2.textContent = settingsState.ad_line2 || "TarkoFFchanin.pro";
      siteAdLine3.textContent = settingsState.ad_line3 || "Следи за анонсами";

      if (settingsState.show_site_ads) {
        siteAdRoot.classList.add("visible");
      } else {
        siteAdRoot.classList.remove("visible");
      }
    }

    async function fetchSettings() {
      try {
        const response = await fetch(`/api/settings?_=${Date.now()}`, {
          cache: "no-store",
        });

        if (!response.ok) return;

        const data = await response.json();
        const settings = data?.settings ?? data;
        applySettings(settings);
      } catch (_) {}
    }

    async function playAlertSound(alert) {
      const customFile = String(alert.soundFile || "").trim();
      const file = customFile || soundFileForAlert(alert);
      const url = buildSoundUrl(file);

      return new Promise((resolve) => {
        try {
          const baseAudio = soundCache.get(file) || new Audio(url);
          const audio = baseAudio.cloneNode();
          audio.volume = clampVolume(settingsState.music_volume, 0.35);

          let done = false;
          const finish = () => {
            if (done) return;
            done = true;
            resolve();
          };

          audio.addEventListener("ended", finish, { once: true });
          audio.addEventListener("error", finish, { once: true });

          const playPromise = audio.play();
          if (playPromise && typeof playPromise.then === "function") {
            playPromise.catch(() => finish());
          }

          setTimeout(finish, 6000);
        } catch (_) {
          resolve();
        }
      });
    }

    async function playTtsAudio(ttsUrl) {
      if (!ttsUrl) return;

      return new Promise((resolve) => {
        try {
          const audio = new Audio(ttsUrl);
          audio.preload = "auto";
          audio.volume = clampVolume(settingsState.tts_volume, 1.0);

          let done = false;
          const finish = () => {
            if (done) return;
            done = true;
            resolve();
          };

          audio.addEventListener("ended", finish, { once: true });
          audio.addEventListener("error", finish, { once: true });

          const playPromise = audio.play();
          if (playPromise && typeof playPromise.then === "function") {
            playPromise.catch(() => finish());
          }

          setTimeout(finish, 30000);
        } catch (_) {
          resolve();
        }
      });
    }

    function pick(...values) {
      for (const v of values) {
        if (v !== undefined && v !== null && String(v).trim() !== "") {
          return v;
        }
      }
      return "";
    }

    function joinChatParts(parts) {
      if (!Array.isArray(parts)) return "";
      let out = "";

      for (const part of parts) {
        if (!part || typeof part !== "object") continue;

        if (part.text && typeof part.text.content === "string") {
          out += part.text.content;
        } else if (part.mention && typeof part.mention.nick === "string") {
          out += "@" + part.mention.nick + " ";
        } else if (part.smile && typeof part.smile.name === "string") {
          out += `:${part.smile.name}: `;
        }
      }

      return out.trim();
    }

    function normalizeCurrencyLabel(currency) {
      const cur = String(currency || "").trim().toUpperCase();
      if (!cur) return "";
      if (cur === "RUB" || cur === "RUR") return "RUB";
      if (cur === "USD") return "USD";
      if (cur === "EUR") return "EUR";
      return cur;
    }

    function parseAmountAndCurrency(rawAmount, rawCurrency) {
      const fallbackCurrency = normalizeCurrencyLabel(rawCurrency);

      if (rawAmount === undefined || rawAmount === null || rawAmount === "") {
        return { amount: null, currency: fallbackCurrency };
      }

      let text = String(rawAmount).trim();
      if (!text) {
        return { amount: null, currency: fallbackCurrency };
      }

      text = text.replace(",", ".");

      const match = text.match(
        /^([+-]?\d+(?:\.\d+)?(?:[eE][+-]?\d+)?)(?:\s*([A-Za-zА-Яа-я₽$€]+))?$/u
      );

      if (!match) {
        return { amount: text, currency: fallbackCurrency };
      }

      const num = Number(match[1]);
      const inlineCurrency = normalizeCurrencyLabel(match[2] || "");
      const currency = inlineCurrency || fallbackCurrency;

      if (Number.isNaN(num)) {
        return { amount: text, currency };
      }

      return { amount: num, currency };
    }

    function formatNumberRu(value) {
      if (typeof value !== "number" || Number.isNaN(value)) return String(value ?? "");
      return value.toLocaleString("ru-RU", {
        minimumFractionDigits: Number.isInteger(value) ? 0 : 2,
        maximumFractionDigits: 2,
      });
    }

    function formatAmount(amount, currency) {
      const parsed = parseAmountAndCurrency(amount, currency);

      if (parsed.amount === null || parsed.amount === "") return "";

      const currencyLabel = parsed.currency || "";

      if (typeof parsed.amount === "number") {
        const formatted = formatNumberRu(parsed.amount);

        if (currencyLabel === "RUB") return `${formatted} ₽`;
        if (currencyLabel) return `${formatted} ${currencyLabel}`;
        return formatted;
      }

      if (currencyLabel === "RUB") return `${parsed.amount} ₽`;
      if (currencyLabel) return `${parsed.amount} ${currencyLabel}`;
      return String(parsed.amount);
    }

    function calculateAdaptiveDuration(baseDurationMs, messageText, amountText) {
      const base = Number(baseDurationMs) || 7000;
      const message = String(messageText || "").trim();
      const amount = String(amountText || "").trim();

      let duration = base;

      if (!message) {
        duration = Math.min(duration, 5200);

        if (!amount) {
          duration = Math.min(duration, 4500);
        }

        return Math.max(4200, duration);
      }

      const len = message.length;

      if (len >= 40) duration += 600;
      if (len >= 80) duration += 900;
      if (len >= 120) duration += 1200;
      if (len >= 180) duration += 1500;

      return Math.min(Math.max(duration, 6000), 12000);
    }

    function isGenericDonationTitle(title, provider) {
      const t = String(title || "").trim().toLowerCase();
      const p = String(providerLabel(provider) || "").trim().toLowerCase();

      if (!t) return true;

      return [
        "донат",
        "новый донат",
        "пожертвование",
        "новое пожертвование",
        "donation",
        "new donation",
        p
      ].includes(t);
    }

    function cleanDisplayText(value) {
      return String(value || "").trim();
    }

    function getSenderSizeClass(text, hasMessage) {
      const len = String(text || "").trim().length;

      if (!hasMessage) {
        if (len >= 20) return "size-xs no-message";
        if (len >= 14) return "size-sm no-message";
        return "no-message";
      }

      if (len >= 24) return "size-xs";
      if (len >= 16) return "size-sm";
      return "";
    }

    function getAmountSizeClass(amountText) {
      const len = String(amountText || "").trim().length;

      if (len >= 11) return "size-xs";
      if (len >= 8) return "size-sm";
      return "";
    }

    function normalizeAlert(rawPayload) {
      let data = rawPayload;

      if (data && typeof data === "object") {
        if (data.type === "ping" || data.event === "ping") return null;
        if (data.alert) data = data.alert;
        else if (data.data && data.data.title) data = data.data;
        else if (data.event && typeof data.event === "object") data = data.event;
      }

      if (!data || typeof data !== "object") return null;

      const provider = pick(
        data.provider,
        data.source,
        data.platform,
        data.origin,
        "custom"
      );

      const payload = data.payload || data.raw || data.meta || {};
      const nestedData = payload.data || {};

      const joinedParts = joinChatParts(
        pick(
          data.parts,
          payload.parts,
          payload.chat_message?.parts,
          nestedData.chat_message?.parts
        )
      );

      const rawTitle = pick(
        data.title,
        data.alert_title,
        data.name,
        payload.title,
        providerLabel(provider)
      );

      const username = pick(
        data.username,
        data.user_name,
        data.user,
        data.author_name,
        data.sender_name,
        payload.username,
        payload.user_name,
        payload.author?.name,
        payload.author?.displayName,
        payload.author?.nick,
        payload.chat_message?.author?.nick,
        nestedData.chat_message?.author?.nick
      );

      const message = pick(
        data.message,
        data.text,
        data.body,
        data.content,
        data.subtitle,
        payload.message,
        payload.text,
        payload.body,
        payload.content,
        payload.reward_name,
        payload.chat_message?.message,
        nestedData.chat_message?.message,
        joinedParts
      );

      const amount = pick(
        data.amount,
        data.value,
        data.price,
        payload.amount,
        payload.value,
        payload.price
      );

      const currency = pick(
        data.currency,
        payload.currency,
        payload.currency_symbol
      );

      const imageUrl = pick(
        data.image_url,
        data.image,
        data.avatar_url,
        payload.image_url,
        payload.image,
        payload.avatar_url,
        payload.author?.avatar_url,
        payload.chat_message?.author?.avatar_url,
        nestedData.chat_message?.author?.avatar_url
      );

      const rawDurationMs = Number(
        pick(
          data.duration_ms,
          data.duration,
          payload.duration_ms,
          payload.duration,
          7000
        )
      ) || 7000;

      const eventType = String(
        pick(
          data.type,
          data.event_type,
          payload.type,
          payload.event_type,
          "custom"
        )
      ).toLowerCase();

      const ttsUrl = pick(
        data.tts_url,
        payload.tts_url,
        nestedData.tts_url,
        ""
      );

      const isDonation = eventType === "donation" || eventType === "superchat";

      let senderName = cleanDisplayText(username);
      if (!senderName && isDonation && !isGenericDonationTitle(rawTitle, provider)) {
        senderName = cleanDisplayText(rawTitle);
      }
      if (!senderName && isDonation) {
        senderName = "Аноним";
      }

      let messageText = cleanDisplayText(message);
      let fallbackTitle = cleanDisplayText(rawTitle || providerLabel(provider));
      const amountText = formatAmount(amount, currency);

      if (isDonation && isGenericDonationTitle(fallbackTitle, provider)) {
        fallbackTitle = "";
      }

      return {
        provider,
        providerText: providerLabel(provider),
        providerClassName: providerClass(provider),
        providerIconText: providerIcon(provider),
        type: eventType,
        senderName,
        fallbackTitle,
        messageText,
        amountText,
        imageUrl: String(imageUrl || ""),
        soundFile: String(
          pick(
            data.sound,
            data.sound_file,
            payload.sound,
            payload.sound_file,
            payload.audio,
            ""
          )
        ),
        ttsUrl: String(ttsUrl || ""),
        durationMs: calculateAdaptiveDuration(rawDurationMs, messageText, amountText),
      };
    }

    function enqueueAlert(raw) {
      const alert = normalizeAlert(raw);
      if (!alert) return;

      queue.push(alert);

      if (!isShowing) {
        showNext();
      }
    }

    function createAlertElement(alert) {
      const card = document.createElement("div");
      card.className = `alert-card ${alert.providerClassName}`;

      const mediaHtml = alert.imageUrl
        ? `
          <div class="alert-avatar">
            <img src="${escapeHtmlAttr(alert.imageUrl)}" alt="avatar">
          </div>
        `
        : `
          <div class="provider-badge">${escapeHtml(alert.providerIconText)}</div>
        `;

      const senderLabel = alert.type === "donation" || alert.type === "superchat"
        ? "Отправил"
        : "Событие";

      const senderText = alert.senderName || alert.fallbackTitle || "Событие";
      const hasMessage = Boolean(String(alert.messageText || "").trim());

      const senderSizeClass = getSenderSizeClass(senderText, hasMessage);
      const amountSizeClass = getAmountSizeClass(alert.amountText);

      const messageBlock = hasMessage
        ? `
          <div class="alert-message-block fade">
            <div class="alert-section-label">Сообщение</div>
            <p class="alert-message">${escapeHtml(alert.messageText)}</p>
          </div>
        `
        : "";

      const amountBadgeClass =
        String(alert.provider || "").toLowerCase() === "donation_alerts" ||
        String(alert.provider || "").toLowerCase() === "donationalerts"
          ? "alert-amount-wrap da"
          : "alert-amount-wrap";

      const amountHtml = alert.amountText
        ? `
          <div class="alert-amount-zone">
            <div class="${amountBadgeClass}">
              <div class="alert-amount-big ${amountSizeClass}">${escapeHtml(alert.amountText)}</div>
            </div>
          </div>
        `
        : `<div class="alert-amount-zone"></div>`;

      card.innerHTML = `
        <div class="alert-media">
          ${mediaHtml}
        </div>

        <div class="alert-main">
          <div class="alert-top">
            <span class="alert-provider"><strong>${escapeHtml(alert.providerText)}</strong></span>
          </div>

          <div class="alert-main-grid">
            <div class="alert-sender-block">
              <div class="alert-section-label">${escapeHtml(senderLabel)}</div>
              <div class="alert-sender ${senderSizeClass}">${escapeHtml(senderText)}</div>
            </div>

            ${messageBlock}
          </div>
        </div>

        ${amountHtml}

        <div class="progress">
          <div class="progress-bar"></div>
        </div>
      `;

      const progressBar = card.querySelector(".progress-bar");
      progressBar.style.animationDuration = `${alert.durationMs}ms`;

      return card;
    }

    async function showNext() {
      if (queue.length === 0) {
        isShowing = false;
        return;
      }

      isShowing = true;

      const alert = queue.shift();
      const element = createAlertElement(alert);

      alertRoot.innerHTML = "";
      alertRoot.appendChild(element);

      const startedAt = performance.now();

      requestAnimationFrame(() => {
        element.classList.add("show");
      });

      await playAlertSound(alert);

      if (alert.ttsUrl) {
        await playTtsAudio(alert.ttsUrl);
      }

      const elapsed = performance.now() - startedAt;
      const remaining = Math.max(0, alert.durationMs - elapsed);
      await wait(remaining);

      element.classList.remove("show");
      element.classList.add("hide");

      await wait(450);

      if (alertRoot.contains(element)) {
        alertRoot.removeChild(element);
      }

      showNext();
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function connect() {
      try {
        if (socket) {
          socket.onopen = null;
          socket.onmessage = null;
          socket.onclose = null;
          socket.onerror = null;
          try { socket.close(); } catch (_) {}
        }

        socket = new WebSocket(wsUrl());

        socket.onopen = () => {};

        socket.onmessage = (event) => {
          try {
            const parsed = JSON.parse(event.data);

            if (Array.isArray(parsed)) {
              parsed.forEach(enqueueAlert);
            } else {
              enqueueAlert(parsed);
            }
          } catch (_) {}
        };

        socket.onclose = () => {
          scheduleReconnect();
        };

        socket.onerror = () => {};
      } catch (_) {
        scheduleReconnect();
      }
    }

    function scheduleReconnect() {
      if (reconnectTimer) return;
      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        connect();
      }, 2000);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeHtmlAttr(value) {
      return escapeHtml(value);
    }

    preloadSounds();
    renderSiteAd();
    fetchSettings();
    setInterval(fetchSettings, 3000);
    connect();
  </script>
</body>
